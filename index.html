<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业ESG信息披露平台</title>
    <!-- 引入CSS样式 -->
    <style>
        /* 1. 全局重置与基础设置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; display: flex; height: 100vh; background-color: #f4f6f9; color: #333; }

        /* 2. 左侧导航栏样式 */
        .sidebar {
            width: 280px;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            padding: 20px 0;
            overflow-y: auto;
        }
        .sidebar h2 {
            font-size: 18px;
            padding: 0 20px 20px;
            color: #1a73e8;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }
        /* 一级目录样式 */
        .menu-item {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .menu-item:hover { background-color: #f0f7ff; color: #1a73e8; }
        
        /* 二级目录样式 */
        .sub-menu { display: none; background-color: #fafafa; }
        .sub-menu-item {
            padding: 10px 20px 10px 40px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .sub-menu-item:hover { background-color: #e8f0fe; color: #1a73e8; }
        /* 当前选中的二级目录高亮 */
        .sub-menu-item.active { background-color: #e8f0fe; color: #1a73e8; border-left: 3px solid #1a73e8; }

        /* 3. 右侧内容区样式 */
        .content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        .content-area h1 { font-size: 28px; margin-bottom: 20px; color: #202124; }
        .content-area p { font-size: 16px; line-height: 1.8; color: #5f6368; }
    </style>
</head>
<body>

    <!-- 左侧多级目录区 -->
    <div class="sidebar">
        <h2>🌍 ESG 披露目录</h2>
        
        <!-- 环境(E) -->
        <div class="menu-item">环境 (E)</div>
        <div class="sub-menu">
            <div class="sub-menu-item active" data-title="碳排放管理" data-content="2023年温室气体排放量同比下降5%，全面推广绿色办公。">碳排放管理</div>
            <div class="sub-menu-item" data-title="水资源保护" data-content="优化生产用水循环系统，水资源重复利用率提升至85%。">水资源保护</div>
        </div>
        
        <!-- 社会(S) -->
        <div class="menu-item">社会 (S)</div>
        <div class="sub-menu">
            <div class="sub-menu-item" data-title="员工权益" data-content="全年员工培训时长达40小时，女性高管占比提升至30%。">员工权益</div>
            <div class="sub-menu-item" data-title="社区公益" data-content="投入100万元用于乡村教育支持，开展20场志愿者活动。">社区公益</div>
        </div>
        
        <!-- 治理(G) -->
        <div class="menu-item">治理 (G)</div>
        <div class="sub-menu">
            <div class="sub-menu-item" data-title="商业道德" data-content="100%员工签署《反腐败合规承诺书》，零违规事件。">商业道德</div>
            <div class="sub-menu-item" data-title="风险管理" data-content="建立全面风险预警机制，全年开展4次合规审查。">风险管理</div>
        </div>
    </div>

    <!-- 右侧内容展示区 -->
    <div class="content-area">
        <h1 id="content-title">碳排放管理</h1>
        <p id="content-text">2023年温室气体排放量同比下降5%，全面推广绿色办公。</p>
    </div>
    <!-- 注入网页的灵魂：JavaScript 交互逻辑 -->
    <script>
    <script>
        // 1. 获取页面上的 DOM 元素
        const sidebar = document.querySelector('.sidebar');
        const contentTitle = document.getElementById('content-title');
        const contentText = document.getElementById('content-text');

        // 2. 页面加载时，自动去 Python 后端“要数据”
        async function loadESGData() {
            try {
                // 向后端发送请求
                const response = await fetch('http://127.0.0.1:5000/api/esg');
                const esgData = await response.json(); // 拿到 JSON 数据

                // 清空左侧目录，准备重新生成
                sidebar.innerHTML = '<h2>🌍 ESG 披露目录</h2>';

                // 3. 遍历拿到的数据，动态生成左侧的多级目录
                esgData.forEach(category => {
                    // 生成一级目录
                    const menuItem = document.createElement('div');
                    menuItem.className = 'menu-item';
                    menuItem.innerText = category.title;
                    sidebar.appendChild(menuItem);

                    // 生成二级目录的容器
                    const subMenu = document.createElement('div');
                    subMenu.className = 'sub-menu';
                    sidebar.appendChild(subMenu);

                    // 遍历子数据，生成二级菜单
                    category.children.forEach((child, index) => {
                        const subMenuItem = document.createElement('div');
                        subMenuItem.className = 'sub-menu-item';
                        subMenuItem.innerText = child.title;
                        
                        // 默认让第一个分类的第一个子项高亮并显示内容
                        if (category === esgData[0] && index === 0) {
                            subMenuItem.classList.add('active');
                            contentTitle.innerText = child.title;
                            contentText.innerText = child.content;
                        }

                        // 给二级菜单绑定点击事件，切换右侧内容
                        subMenuItem.addEventListener('click', function() {
                            // 移除所有高亮
                            document.querySelectorAll('.sub-menu-item').forEach(sub => sub.classList.remove('active'));
                            this.classList.add('active');
                            
                            // 更新右侧内容
                            contentTitle.innerText = child.title;
                            contentText.innerText = child.content;
                        });

                        subMenu.appendChild(subMenuItem);
                    });

                    // 给一级菜单绑定点击事件，展开/收起
                    menuItem.addEventListener('click', function() {
                        subMenu.style.display = subMenu.style.display === 'block' ? 'none' : 'block';
                    });
                });
            } catch (error) {
                console.error('获取 ESG 数据失败，请确保 Python 后端已启动:', error);
                contentTitle.innerText = '数据加载失败';
                contentText.innerText = '请确保 Python 后端正在运行，并刷新页面重试。';
            }
        }

        // 4. 启动加载数据
        loadESGData();
    </script>
    </script>
</body>
</html>
